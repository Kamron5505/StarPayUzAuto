<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgPat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003300"/>
      <stop offset="100%" style="stop-color:#006600"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bgPat)"/>
  <!-- Bear ears -->
  <circle cx="72" cy="52" r="18" fill="#8B6914"/>
  <circle cx="128" cy="52" r="18" fill="#8B6914"/>
  <circle cx="72" cy="52" r="9" fill="#D2A900"/>
  <circle cx="128" cy="52" r="9" fill="#D2A900"/>
  <!-- Bear body -->
  <ellipse cx="100" cy="130" rx="50" ry="42" fill="#8B6914"/>
  <ellipse cx="100" cy="137" rx="32" ry="26" fill="#D2A900"/>
  <!-- Bear head -->
  <circle cx="100" cy="80" r="38" fill="#8B6914"/>
  <circle cx="100" cy="87" r="26" fill="#D2A900"/>
  <!-- Eyes -->
  <circle cx="87" cy="74" r="5" fill="#fff"/>
  <circle cx="113" cy="74" r="5" fill="#fff"/>
  <circle cx="88" cy="73" r="3" fill="#333"/>
  <circle cx="114" cy="73" r="3" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="100" cy="90" rx="5" ry="3.5" fill="#333"/>
  <!-- Smile -->
  <path d="M94 95 Q100 101 106 95" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Green top hat -->
  <rect x="72" y="15" width="56" height="35" rx="3" fill="#00a86b"/>
  <rect x="68" y="45" width="64" height="8" rx="4" fill="#00a86b"/>
  <rect x="72" y="18" width="56" height="5" fill="#ffd700"/>
  <!-- Clover (Shamrock) -->
  <text x="152" y="50" font-size="28" fill="#2ecc71">☘️</text>
  <text x="32" y="60" font-size="22" fill="#2ecc71" opacity="0.7">🍀</text>
  <!-- Hat buckle -->
  <rect x="94" y="27" width="12" height="12" rx="2" fill="none" stroke="#ffd700" stroke-width="2"/>
  <!-- Blush -->
  <ellipse cx="76" cy="90" rx="7" ry="4" fill="#ff9999" opacity="0.4"/>
  <ellipse cx="124" cy="90" rx="7" ry="4" fill="#ff9999" opacity="0.4"/>
</svg>