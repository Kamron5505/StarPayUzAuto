<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgEas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bgEas)"/>
  <!-- Bear ears -->
  <circle cx="72" cy="52" r="18" fill="#D2B48C"/>
  <circle cx="128" cy="52" r="18" fill="#D2B48C"/>
  <circle cx="72" cy="52" r="9" fill="#FFE4C4"/>
  <circle cx="128" cy="52" r="9" fill="#FFE4C4"/>
  <!-- Bunny ears on bear -->
  <ellipse cx="90" cy="18" rx="8" ry="25" fill="#FFE4C4" transform="rotate(-10 90 18)"/>
  <ellipse cx="110" cy="18" rx="8" ry="25" fill="#FFE4C4" transform="rotate(10 110 18)"/>
  <ellipse cx="90" cy="18" rx="5" ry="20" fill="#ffb6c1" transform="rotate(-10 90 18)"/>
  <ellipse cx="110" cy="18" rx="5" ry="20" fill="#ffb6c1" transform="rotate(10 110 18)"/>
  <!-- Bear body -->
  <ellipse cx="100" cy="130" rx="50" ry="42" fill="#D2B48C"/>
  <ellipse cx="100" cy="137" rx="32" ry="26" fill="#FFE4C4"/>
  <!-- Bear head -->
  <circle cx="100" cy="80" r="38" fill="#D2B48C"/>
  <circle cx="100" cy="87" r="26" fill="#FFE4C4"/>
  <!-- Eyes -->
  <circle cx="87" cy="74" r="5" fill="#fff"/>
  <circle cx="113" cy="74" r="5" fill="#fff"/>
  <circle cx="88" cy="73" r="3" fill="#333"/>
  <circle cx="114" cy="73" r="3" fill="#333"/>
  <!-- Blush -->
  <ellipse cx="76" cy="90" rx="7" ry="4" fill="#ff9999" opacity="0.5"/>
  <ellipse cx="124" cy="90" rx="7" ry="4" fill="#ff9999" opacity="0.5"/>
  <!-- Nose -->
  <ellipse cx="100" cy="90" rx="5" ry="3.5" fill="#333"/>
  <!-- Smile -->
  <path d="M94 95 Q100 101 106 95" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Easter eggs -->
  <ellipse cx="45" cy="110" rx="14" ry="18" fill="#2ecc71"/>
  <ellipse cx="45" cy="110" rx="10" ry="14" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,3"/>
  <ellipse cx="155" cy="105" rx="14" ry="18" fill="#f1c40f"/>
  <ellipse cx="155" cy="105" rx="10" ry="14" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,3"/>
  <ellipse cx="155" cy="125" rx="10" ry="12" fill="#e74c3c" opacity="0.6"/>
  <circle cx="45" cy="108" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="155" cy="103" r="3" fill="#fff" opacity="0.6"/>
</svg>